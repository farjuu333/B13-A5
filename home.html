   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

 <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        *{ font-family: "Geist", sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="modal-container"></div>
    
        <nav class="bg-white border-b border-[#E9E9E9] px-4 md:px-[80px] py-[16px] flex flex-col md:flex-row items-center justify-between w-full gap-4">
    
    <div class="flex items-center gap-2 w-full md:w-auto justify-center md:justify-start">
    <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8">
    <h1 class="text-[18px] md:text-[20px] font-bold text-[#1F2937] tracking-tight whitespace-nowrap">
        GitHub Issues Tracker
    </h1>
</div>

    <div class="flex items-center gap-3">
        <div class="relative w-full max-w-[300px]">
            <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                <i class="fa-solid fa-magnifying-glass text-sm"></i>
            </span>
            <input type="text" id="search-input" placeholder="Search issues..." 
                class="w-full pl-10 pr-4 py-2 bg-gray-50 border border-gray-200 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm">
        </div>

        <button class="bg-primary text-white px-5 py-2 rounded-md text-sm font-semibold flex items-center gap-1 hover:bg-indigo-700 transition-colors">
            <span class="text-lg">+</span> New Issue
        </button>
    </div>

</nav>
<main class="w-full md:w-[80%] mx-auto pt-10 pb-10 px-4 md:px-0 ">
    <div class="flex flex-wrap gap-2 mb-4 p-6 border border-white rounded-lg shadow-sm bg-white">
    <button id="all-filter-btn" class="border bg-blue-600 rounded text-white px-6 md:px-8 py-2">All</button>
    <button id="open-filter-btn" class="border border-slate-100 rounded bg-white text-slate-500 px-3 py-2">Open</button>
    <button id="closed-filter-btn" class="border border-slate-100 rounded bg-white text-slate-500 px-3 py-2">Closed</button>
</div>
            <div class="bg-white border border-[#E9E9E9] rounded-xl p-6 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-4">
            <div >
                <img  src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h2 class="text-[20px] font-bold text-[#1F2937] leading-tight">50 Issues</h2>
                <p class="text-sm text-[#64748B] font-normal">Track and manage your project issues</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-emerald-500 rounded-full"></span>
                <span class="text-sm font-medium text-gray-700">Open</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                <span class="text-sm font-medium text-gray-700">Closed</span>
            </div>
        </div>
    </div>

<div id="loader" class="hidden flex justify-center items-center my-20">
            <span class="loading loading-spinner loading-lg text-indigo-600"></span>
        </div>

        <div id="no-result" class="hidden text-center my-20">
            <div class="flex flex-col items-center gap-4">
                <i class="fa-solid fa-magnifying-glass text-5xl text-gray-200"></i>
                <p class="text-gray-400 font-medium text-lg">No Issues Found!</p>
                <p class="text-gray-300 text-sm">Try searching with different keywords.</p>
            </div>
        </div>
    
    
     <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 max-w-[1200px] mx-auto mt-6 px-4 pb-10">
    </div>

    

</main>
    
    
    <script src="./script.js"></script>
</body>
</html>
