<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B13-A5</title>
    <!-- tailwind & daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- font -->
 <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        *{ font-family: "Geist", sans-serif; }
    </style>
</head>

    <body class="bg-gray-50 flex items-center justify-center min-h-screen py-[60px]">

    <div class="bg-white p-8 rounded-lg shadow-md border border-gray-200 w-full max-w-[420px] flex flex-col items-center gap-6">
        
        <div class="flex flex-col items-center gap-2">
            <img src="./assets/github-logo.png" alt="Logo" class="w-12 h-12">
            <h1 class="text-2xl font-semibold text-gray-800">GitHub Issues Tracker</h1>
            <p class="text-sm text-gray-500">Sign in to manage your issues</p>
        </div>

        <form class="w-full flex flex-col gap-4">
            <div>
                <label class="block text-base font-medium text-[#1F2937] mb-1">Username</label>
                <input id="input-name" type="text" placeholder="Enter Username" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                <p class="text-sm font-normal text-primary mt-1">Default: admin</p>
            </div>

            <div>
                <label class="block text-base font-medium text-[#1F2937] mb-1">Password</label>
                <input id="input-password" type="password" placeholder="Enter Password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
                <p class="text-sm font-normal text-primary mt-1">Default: admin123</p>
            </div>

            <button id="btn-signIn" class="w-full bg-primary hover:bg-indigo-700 text-white font-semibold py-2 rounded-md transition duration-200 text-sm">
                Sign In
            </button>
        </form>

        <div class="relative flex items-center justify-center w-full my-4">
    <hr class="w-full border-t border-[#E4E4E7]">
    
    <span class="absolute px-3 bg-white text-[#1F2937] font-normal text-sm">
        OR
    </span>
</div>

        <div class="text-center bg-gray-50 p-3 rounded w-full">
            <p class="text-[#64748B] font-normal text-sm  text-center mb-6">Demo Credentials:</p>
            <div class="flex flex-col items-center gap-2"> 
    <p class="text-base text-[#1F2937] text-center">
        <span class="font-bold">Username:</span> 
        <span class="font-normal text-gray-600">admin</span>
    </p>
    <p class="text-base text-[#1F2937] text-center">
        <span class="font-bold">Password:</span> 
        <span class="font-normal text-gray-600">admin123</span>
    </p>
</div>
        </div>
    </div>


     <script src="./script.js"></script> 
    <script src="./login.js"></script>
</body>
</html>
